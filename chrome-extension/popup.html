<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reddit Token Copier</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0b1426;
            color: #e2e8f0;
            padding: 16px;
            width: 280px;
            margin: 0;
            border-radius: 8px;
            box-sizing: border-box;
        }
        h3 {
            margin-top: 0;
            font-size: 14px;
            font-weight: 600;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        p {
            font-size: 11px;
            color: #94a3b8;
            margin-bottom: 16px;
            line-height: 1.4;
        }
        .btn {
            background-color: #ff4500;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s ease;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .btn:hover {
            background-color: #e03d00;
        }
        .btn:active {
            transform: scale(0.98);
        }
        .btn:disabled {
            background-color: #1f2d44;
            color: #64748b;
            cursor: not-allowed;
        }
        .status {
            font-size: 11px;
            margin-top: 10px;
            text-align: center;
            min-height: 16px;
            font-weight: 500;
        }
        .success {
            color: #10b981;
        }
        .error {
            color: #f43f5e;
        }
    </style>
</head>
<body>
    <h3>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ff4500" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a10 10 0 1 0 10 10H12V2z"/><path d="M12 2a10 10 0 0 1 10 10h-10V2z"/><path d="M12 12L22 12"/></svg>
        Reddit Token Copier
    </h3>
    <p>Navigiere zu reddit.com (und logge dich ggf. ein), klicke dann auf den Button unten, um alle Cookies als kombinierten String zu kopieren.</p>
    
    <button id="copy-btn" class="btn">
        Cookies kopieren
    </button>
    <div id="status" class="status"></div>

    <script src="popup.js"></script>
</body>
</html>
