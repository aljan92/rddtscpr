version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: rddtscpr_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres_password}
      POSTGRES_DB: ${DB_NAME:-rddtscpr}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    container_name: rddtscpr_web
    restart: always
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres_password}@db:5432/${DB_NAME:-rddtscpr}
      - REDDIT_USERNAME=${REDDIT_USERNAME}
      - REDDIT_PASSWORD=${REDDIT_PASSWORD}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - PROXY_URL=${PROXY_URL}
    volumes:
      - ./app/data:/app/app/data
    depends_on:
      - db

volumes:
  postgres_data:
